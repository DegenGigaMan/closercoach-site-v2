<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Enterprise team placeholder">
	<defs>
		<radialGradient id="enBg" cx="50%" cy="45%" r="80%">
			<stop offset="0%" stop-color="#1E2230"/>
			<stop offset="70%" stop-color="#141720"/>
			<stop offset="100%" stop-color="#0D4A38"/>
		</radialGradient>
		<linearGradient id="enFig" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#10B981" stop-opacity="0.32"/>
			<stop offset="100%" stop-color="#059669" stop-opacity="0.10"/>
		</linearGradient>
	</defs>
	<circle cx="100" cy="100" r="100" fill="url(#enBg)"/>
	<!-- Abstract team silhouette: three overlapping circles across a grounded bar -->
	<g fill="url(#enFig)">
		<circle cx="70" cy="88" r="22"/>
		<circle cx="100" cy="78" r="26"/>
		<circle cx="130" cy="88" r="22"/>
		<path d="M32 198 C32 142 168 142 168 198 Z"/>
	</g>
	<!-- 22-seat motif: faint grid dots signifying distributed team -->
	<g fill="#10B981" fill-opacity="0.5">
		<circle cx="60" cy="150" r="2"/>
		<circle cx="76" cy="150" r="2"/>
		<circle cx="92" cy="150" r="2"/>
		<circle cx="108" cy="150" r="2"/>
		<circle cx="124" cy="150" r="2"/>
		<circle cx="140" cy="150" r="2"/>
		<circle cx="60" cy="164" r="2"/>
		<circle cx="76" cy="164" r="2"/>
		<circle cx="92" cy="164" r="2"/>
		<circle cx="108" cy="164" r="2"/>
		<circle cx="124" cy="164" r="2"/>
		<circle cx="140" cy="164" r="2"/>
	</g>
	<circle cx="100" cy="100" r="98.5" fill="none" stroke="#10B981" stroke-opacity="0.45" stroke-width="1.5"/>
</svg>
